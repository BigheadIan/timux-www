<!DOCTYPE html>
<html>
<head>
    <title>表單測試</title>
</head>
<body>
    <h2>聯繫表單測試</h2>
    <form id="contact-form">
        <p>姓名: <input type="text" name="name" value="測試用戶" required></p>
        <p>郵件: <input type="email" name="email" value="test@example.com" required></p>
        <p>公司: <input type="text" name="company" value="測試公司"></p>
        <p>產品: 
            <select name="product">
                <option value="aics">AI 智能客服</option>
                <option value="fortune" selected>AI 智能算命</option>
                <option value="other">其他</option>
            </select>
        </p>
        <p>訊息: <textarea name="message" required>我想了解 AI 智能算命的詳細功能和定價</textarea></p>
        <button type="submit">測試提交</button>
        <p id="form-status" class="hidden"></p>
    </form>

    <script>
        // 複製修復後的表單處理邏輯
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                company: formData.get('company'),
                product: formData.get('product'),
                message: formData.get('message')
            };
            
            const mailtoLink = `mailto:bigheadian1166@gmail.com?subject=${encodeURIComponent(`[Timux 官網] ${data.product} 詢問 - ${data.name}`)}&body=${encodeURIComponent(`姓名：${data.name}\n郵件：${data.email}\n公司：${data.company || '無'}\n產品：${data.product}\n\n訊息：\n${data.message}\n\n---\n此訊息來自 Timux 官網聯繫表單 (www.timux.site)`)}`;
            
            console.log('✅ 生成的 mailto 連結:', mailtoLink);
            console.log('✅ 表單數據:', data);
            
            document.getElementById('form-status').innerHTML = '✅ 表單功能正常！會自動開啟郵件客戶端';
            document.getElementById('form-status').className = 'text-green-600 font-bold mt-4';
            
            return false;
        });
    </script>
</body>
</html>
