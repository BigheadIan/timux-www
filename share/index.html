const tagLabels = { slides: "投影片", course: "課程", guide: "指南", research: "研究", proposal: "提案" };
const tagColors = {
    slides: "bg-indigo-500/20 text-indigo-300",
    course: "bg-emerald-500/20 text-emerald-300",
    guide: "bg-amber-500/20 text-amber-300",
    research: "bg-cyan-500/20 text-cyan-300",
    proposal: "bg-pink-500/20 text-pink-300"
};

function renderCards(filter) {
    const container = document.getElementById('cards');
    const filtered = filter === 'all' ? items : items.filter(i => i.tags.includes(filter));
    const emptyMsg = document.getElementById('empty-msg');

    if (filtered.length === 0) {
        container.innerHTML = '';
        emptyMsg.classList.remove('hidden');
        return;
    }
    emptyMsg.classList.add('hidden');

    container.innerHTML = filtered.map(item => `
        <a href="${item.url}" class="card block bg-slate-900 border border-slate-800 rounded-xl p-5 no-underline">
            <div class="flex items-start justify-between mb-3">
                <span class="text-2xl">${item.icon}</span>
                <span class="text-xs text-slate-500">${item.date}</span>
            </div>
            <h3 class="text-white font-semibold mb-2 leading-snug">${item.title}</h3>
            <p class="text-slate-400 text-sm mb-3 leading-relaxed">${item.desc}</p>
            <div class="flex flex-wrap gap-1.5">
                ${item.tags.map(t => `<span class="tag ${tagColors[t]}">${tagLabels[t]}</span>`).join('')}
            </div>
        </a>
    `).join('');
}

// Filter click handlers
document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    const filter = btn.dataset.filter;

    document.querySelectorAll('#filters button').forEach(b => {
        b.className = 'tag bg-slate-800 text-slate-300 border border-slate-700 cursor-pointer hover:bg-slate-700 transition';
    });
    btn.className = 'tag bg-primary/20 text-primary border border-primary/30 cursor-pointer hover:bg-primary/30 transition active-filter';

    renderCards(filter);
});

// Initial render
renderCards('all');
